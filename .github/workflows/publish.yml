name: Publish To npm (Trusted)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@ii_elif_ii"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check If Version Already Published
        id: version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} is already published for ${PACKAGE_NAME}."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} is not published yet for ${PACKAGE_NAME}."
          fi

      - name: Publish (Trusted Publishing)
        if: steps.version_check.outputs.published == 'false'
        run: npm publish --access public --provenance
